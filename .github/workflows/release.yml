name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Validate tag matches version.py
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = python -c "from version import __version__; print(__version__)"
          if ($tag -ne "v$version") {
            throw "Tag ($tag) does not match version.py (v$version)"
          }

      - name: Run tests
        shell: pwsh
        run: pytest -q

      - name: Build executable
        shell: pwsh
        run: |
          $version = python -c "from version import __version__; print(__version__)"
          pyinstaller --noconfirm --onefile --windowed `
            --name "SE_Tactical_Command_v$version" `
            --icon "app_icon.ico" `
            --add-data "README.md;." `
            --add-data "LICENSE;." `
            --add-data "RELEASE_NOTES.md;." `
            --add-data "profiles;profiles" `
            --add-data "data;data" `
            gui_standalone.py

      - name: Create release changelog body
        shell: pwsh
        run: Copy-Item RELEASE_NOTES.md release_body.md

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          $exes = Get-ChildItem -Path dist -Filter *.exe
          if (-not $exes) { throw "No executables produced in dist/" }
          $lines = foreach ($exe in $exes) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $exe.FullName).Hash.ToLower()
            "$hash  $($exe.Name)"
          }
          $lines | Set-Content -Path dist/SHA256SUMS.txt -Encoding ascii
          Get-Content dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: release_body.md
          files: |
            dist/*.exe
            dist/SHA256SUMS.txt

